<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Our Memory ✨</title>
    <style>
        /* 基础重置 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* 网页背景：超温柔的星空粉蓝渐变暗调 */
        body {
            background: linear-gradient(135deg, #121b2d 0%, #1a1c3a 50%, #2a1b35 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; /* 彻底禁止上下滑动 */
            padding: 20px;
            position: relative;
        }

        /* --- 闪动爱心背景区域 --- */
        .heart-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 不阻挡点击事件 */
            z-index: 1;
        }

        /* 爱心样式与闪烁动画 */
        .heart {
            position: absolute;
            color: rgba(255, 192, 203, 0.25);
            font-size: 20px;
            animation: blink 3s infinite ease-in-out;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 0.9; transform: scale(1.2); text-shadow: 0 0 10px rgba(255,192,203,0.5); }
        }

        /* 可爱风拍立得容器 */
        .card-container {
            width: 100%;
            max-width: 360px; /* 紧凑的精致小卡片尺寸 */
            background: rgba(255, 255, 255, 0.07);
            padding: 16px 16px 20px 16px;
            border-radius: 28px; /* 极其圆润的可爱大圆角 */
            border: 2px solid rgba(255, 192, 203, 0.2); /* 淡淡的粉色边框 */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 
                        0 0 15px rgba(165, 195, 243, 0.2); /* 柔和的发光 */
            backdrop-filter: blur(12px);
            animation: float 4s ease-in-out infinite; /* 让卡片微微上下浮动 */
            z-index: 2;
        }

        /* 卡片上下浮动的治愈系动画 */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        /* 视频外层再加一层双边框，制造相框的精致感 */
        .video-box {
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: #000;
        }

        video {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        /* 下方的萌系文字区域 */
        .footer-text {
            margin-top: 16px;
            text-align: center;
        }

        /* 主标题 */
        .main-title {
            color: #ffccd5;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 6px;
            text-shadow: 0 0 8px rgba(255, 204, 213, 0.6);
        }

        /* 副标题：复刻视频文案 */
        .subtitle {
            color: #a5c3f3;
            font-size: 12px;
            letter-spacing: 1px;
            font-weight: 300;
            opacity: 0.8;
        }

        /* 悬浮提示小气泡 */
        .audio-tip {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 20px;
            letter-spacing: 1px;
            opacity: 0.6;
            animation: pulse 2s infinite;
            z-index: 2;
        }

        /* 提示文字呼吸灯动画 */
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div class="heart-bg">
        <div class="heart" style="top: 15%; left: 10%; animation-delay: 0s;">❤️</div>
        <div class="heart" style="top: 25%; left: 80%; animation-delay: 0.5s; font-size: 14px;">💖</div>
        <div class="heart" style="top: 60%; left: 15%; animation-delay: 1.2s; font-size: 16px;">❤️</div>
        <div class="heart" style="top: 45%; left: 85%; animation-delay: 0.8s;">💕</div>
        <div class="heart" style="top: 75%; left: 70%; animation-delay: 1.5s; font-size: 13px;">❤️</div>
        <div class="heart" style="top: 85%; left: 25%; animation-delay: 0.3s;">✨</div>
    </div>

    <div class="card-container">
        <div class="video-box">
            <video id="myVideo" autoplay loop muted playsinline webkit-playsinline>
                <source src="77memory.mp4" type="video/mp4">
                您的浏览器不支持 HTML5 视频播放。
            </video>
        </div>
        
        <div class="footer-text">
            <div class="main-title"> Our Memory 🤍 </div>
            <div class="subtitle">77 Happy Brithday!🎂.</div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="backmusic.mp3" type="audio/mpeg">
    </audio>

    <div class="audio-tip">🎵 戳一戳屏幕，唤醒背景音乐</div>

    <script>
        // 点击屏幕任何地方，立刻激活背景音乐
        document.addEventListener('click', function() {
            var music = document.getElementById('bgMusic');
            if (music.paused) {
                music.play().catch(function(error) {
                    console.log("音乐播放失败:", error);
                });
            }
            // 成功播放后，隐藏提示气泡
            var tip = document.querySelector('.audio-tip');
            if(tip) tip.style.display = 'none';
        }, { once: true });
    </script>

</body>
</html>
