<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Our Memory ✨</title>
    <style>
        /* 基础重置 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* 整个页面允许垂直滚动 */
        html, body {
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(135deg, #121b2d 0%, #1a1c3a 50%, #2a1b35 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #fff;
            scroll-behavior: smooth; /* 让滚动变丝滑 */
        }

        /* --- 闪动爱心背景区域 --- */
        .heart-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none; /* 不阻挡点击事件 */
            z-index: 1;
        }

        /* 爱心样式与闪烁动画 */
        .heart {
            position: absolute;
            color: rgba(255, 192, 203, 0.25);
            font-size: 20px;
            animation: blink 3s infinite ease-in-out;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 0.9; transform: scale(1.2); text-shadow: 0 0 10px rgba(255,192,203,0.5); }
        }

        /* --- 页面分屏结构 --- */
        .section {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            position: relative;
            z-index: 2;
            padding: 20px;
        }

        /* 第一屏：视频卡片 */
        .card-container {
            width: 100%;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.07);
            padding: 16px 16px 20px 16px;
            border-radius: 28px;
            border: 2px solid rgba(255, 192, 203, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 0 0 15px rgba(165, 195, 243, 0.2);
            backdrop-filter: blur(12px);
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .video-box {
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: #000;
        }
        video { width: 100%; display: block; object-fit: cover; }

        .footer-text { margin-top: 16px; text-align: center; }
        .main-title {
            color: #ffccd5; font-size: 16px; font-weight: bold; letter-spacing: 3px; margin-bottom: 6px;
            text-shadow: 0 0 8px rgba(255, 204, 213, 0.6);
        }
        .subtitle { color: #a5c3f3; font-size: 12px; letter-spacing: 1px; opacity: 0.8; }

        /* 音乐提示气泡 */
        .audio-tip {
            margin-top: 15px; background: rgba(255, 255, 255, 0.1); color: #fff; font-size: 11px;
            padding: 4px 12px; border-radius: 20px; opacity: 0.6; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }

        /* 下滑指示箭头 */
        .scroll-down {
            position: absolute;
            bottom: 30px;
            color: #ffccd5;
            font-size: 20px;
            animation: bounce 2s infinite;
            cursor: pointer;
            text-decoration: none;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        /* 第二屏：says.txt 文本展示区 */
        .text-container {
            width: 100%;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        /* 文本排版样式：保留空格和换行，像读信一样 */
        .letter-content {
            color: #e2e8f0;
            font-size: 14px;
            line-height: 1.8;
            letter-spacing: 1.5px;
            white-space: pre-wrap; /* 自动换行并保留txt里的换行格格式 */
            text-align: justify;
        }
    </style>
</head>
<body>

    <div class="heart-bg">
        <div class="heart" style="top: 15%; left: 10%; animation-delay: 0s;">❤️</div>
        <div class="heart" style="top: 25%; left: 80%; animation-delay: 0.5s; font-size: 14px;">💖</div>
        <div class="heart" style="top: 60%; left: 15%; animation-delay: 1.2s; font-size: 16px;">❤️</div>
        <div class="heart" style="top: 45%; left: 85%; animation-delay: 0.8s;">💕</div>
        <div class="heart" style="top: 75%; left: 70%; animation-delay: 1.5s; font-size: 13px;">❤️</div>
        <div class="heart" style="top: 85%; left: 25%; animation-delay: 0.3s;">✨</div>
    </div>

    <div class="section" id="page1">
        <div class="card-container">
            <div class="video-box">
                <video autoplay loop muted playsinline webkit-playsinline>
                    <source src="77memory.mp4" type="video/mp4">
                </video>
            </div>
            <div class="footer-text">
                <div class="main-title"> Our Memory 🤍 </div>
                <div class="subtitle">77 happy brithday!🎂.</div>
            </div>
        </div>
        
        <div class="audio-tip">🎵 戳一戳屏幕，唤醒背景音乐</div>
        
        <a href="#page2" class="scroll-down">👇 往下滑动有悄悄话</a>
    </div>

    <div class="section" id="page2">
        <div class="text-container">
            <div class="letter-content">
亲爱的：

这里是你想对她说的话。
只要在这里直接敲回车换行，
网页上就会原封不动地展示出来。

1468天，制造了好多好多的回忆。
未来也请多多指教啦！
🪐✨
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="backmusic.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 点击屏幕任何地方，立刻激活背景音乐
        document.addEventListener('click', function() {
            var music = document.getElementById('bgMusic');
            if (music.paused) {
                music.play().catch(function(e){ console.log(e) });
            }
            var tip = document.querySelector('.audio-tip');
            if(tip) tip.style.display = 'none';
        }, { once: true });
    </script>

</body>
</html>
