<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Our Memory ✨</title>
    <style>
        /* 基础重置 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* 网页背景：换成超温柔的星空粉蓝渐变暗调，治愈又可爱 */
        body {
            background: linear-gradient(135deg, #121b2d 0%, #1a1c3a 50%, #2a1b35 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            padding: 20px;
        }

        /* 可爱风拍立得容器 */
        .card-container {
            width: 100%;
            max-width: 360px; /* 紧凑的精致小卡片尺寸 */
            background: rgba(255, 255, 255, 0.07);
            padding: 16px 16px 20px 16px;
            border-radius: 28px; /* 极其圆润的可爱大圆角 */
            border: 2px solid rgba(255, 192, 203, 0.2); /* 淡淡的粉色边框 */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 
                        0 0 15px rgba(165, 195, 243, 0.2); /* 柔和的发光 */
            backdrop-filter: blur(12px);
            animation: float 4s ease-in-out infinite; /* 让卡片微微上下浮动，像云朵一样 */
        }

        /* 视频外层再加一层双边框，制造贴纸/相框的精致感 */
        .video-box {
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: #000;
        }

        video {
            width: 100%;
            display: block;
            object-fit: cover;
        }
