<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Our Memory</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b1528; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 核心容器：用于处理旋转逻辑 */
        .main-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 视频样式 */
        video {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            background: #000;
        }

        /* --- 竖屏模式下的样式（强制横屏核心） --- */
        @media screen and (orientation: portrait) {
            video {
                /* 竖屏时，将视频逆时针旋转90度，使其横过来 */
                transform: rotate(90deg);
                /* 这里的宽度和高度需要对调计算，确保横过来后能撑满屏幕高度 */
                width: 100vh; 
                height: 100vw;
                object-fit: contain; 
            }
            
            /* 竖屏时的文字提示（也会跟着旋转） */
            .tip-text {
                position: absolute;
                color: rgba(121, 159, 203, 0.6);
                font-size: 12px;
                letter-spacing: 2px;
                transform: rotate(90deg);
                bottom: 20px;
                white-space: nowrap;
            }
        }

        /* --- 横屏模式下的样式（当用户真的横放手机时） --- */
        @media screen and (orientation: landscape) {
            video {
                transform: none;
                width: 100vw;
                height: 100vh;
                object-fit: contain;
            }
            .tip-text {
                display: none; /* 横屏时隐藏提示 */
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <video id="myVideo" autoplay loop muted playsinline webkit-playsinline>
            <source src="77memory.mp4" type="video/mp4">
            您的浏览器不支持 HTML5 视频播放。
        </video>
        
        <div class="tip-text">Tired of my emotions. 🔄 建议横屏观看</div>
    </div>

    <script>
        // 这是一个贴心的优化小脚本：
        // 虽然系统强制静音了才能自动播放，但只要用户在页面上任意地方点一下，就自动开启声音
        document.addEventListener('click', function() {
            var video = document.getElementById('myVideo');
            if (video.muted) {
                video.muted = false; // 解除静音
            }
        }, { once: true }); // 只触发一次
    </script>

</body>
</html>
