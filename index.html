<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Happy Birthday!🎂</title>
    <style>
        /* 基础重置 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #121b2d 0%, #1a1c3a 50%, #2a1b35 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; 
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* --- 闪动爱心背景 --- */
        .heart-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            z-index: 1;
        }
        .heart {
            position: absolute;
            color: rgba(255, 192, 203, 0.25);
            font-size: 20px;
            animation: blink 3s infinite ease-in-out;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 0.9; transform: scale(1.2); text-shadow: 0 0 10px rgba(255,192,203,0.5); }
        }

        /* --- 第一页：视频卡片页 --- */
        #page-video {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            z-index: 2;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .card-container {
            width: 100%;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.07);
            padding: 16px 16px 20px 16px;
            border-radius: 28px;
            border: 2px solid rgba(255, 192, 203, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 0 0 15px rgba(165, 195, 243, 0.2);
            backdrop-filter: blur(12px);
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .video-box {
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: #000;
        }
        video { width: 100%; display: block; object-fit: cover; }
        .footer-text { margin-top: 16px; text-align: center; }
        .main-title {
            color: #ffccd5; font-size: 16px; font-weight: bold; letter-spacing: 3px; margin-bottom: 6px;
            text-shadow: 0 0 8px rgba(255, 204, 213, 0.6);
        }
        .subtitle { color: #a5c3f3; font-size: 12px; letter-spacing: 1px; opacity: 0.8; }

        .audio-tip {
            margin-top: 15px; background: rgba(255, 255, 255, 0.1); color: #fff; font-size: 11px;
            padding: 4px 12px; border-radius: 20px; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }

        .next-btn {
            margin-top: 25px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #ffccd5 0%, #a5c3f3 100%);
            border: none;
            border-radius: 20px;
            color: #121b2d;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 8px 20px rgba(165, 195, 243, 0.4);
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease, transform 0.3s ease; 
        }
        .next-btn.show { opacity: 1; pointer-events: auto; }
        .next-btn:active { transform: scale(0.95); }

        /* --- 第二页：分类文本页 --- */
        #page-text {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            z-index: 2;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none; 
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        #page-text.active { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .text-card {
            width: 100%;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 28px;
            padding: 25px;
            border: 2px solid rgba(165, 195, 243, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tabs-nav {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px;
            border-radius: 50px;
        }

        .tab-btn {
            flex: 1;
            padding: 8px 0;
            background: transparent;
            border: none;
            color: #a5c3f3;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
            text-align: center;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #ffccd5 0%, #a5c3f3 100%);
            color: #121b2d;
            box-shadow: 0 4px 10px rgba(255, 204, 213, 0.3);
        }

        /* 文本展示核心容器区 */
        .mosaic-container {
            width: 100%;
            height: 200px;
            position: relative;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
        }

        /* 真实文字层，真正的底层高斯模糊 */
        .tab-content-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            z-index: 5;
            
            /* 初始彻底高斯模糊状态 */
            filter: blur(20px);
            -webkit-filter: blur(20px);
            
            /* 中心扩散清晰的遮罩处理 */
            mask-image: radial-gradient(circle, black 0%, black 0%);
            -webkit-mask-image: radial-gradient(circle, black 0%, black 0%);
            mask-size: 300% 300%;
            -webkit-mask-size: 300% 300%;
            mask-position: center;
            -webkit-mask-position: center;

            transition: filter 0.8s ease, -webkit-filter 0.8s ease;
        }

        /* 解锁后消除模糊 */
        .tab-content-wrapper.unlocked {
            filter: blur(0px) !important;
            -webkit-filter: blur(0px) !important;
        }

        .tab-panel {
            display: none; 
            color: #e2e8f0;
            font-size: 14px;
            line-height: 1.8;
            letter-spacing: 1.5px;
            white-space: pre-wrap; 
            width: 100%;
        }
        .tab-panel.active { display: block; }

        /* 浮在模糊文字之上的独立提示文本容器层（高于内容层） */
        .mosaic-text-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 15; /* 确保层级高于模糊文本，防止无法遮挡 */
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none; 
            padding: 15px;
            text-align: center;
        }

        .mosaic-tip {
            display: none; /* 默认全部隐藏 */
            color: #ffccd5;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(0,0,0,0.9);
            animation: pulse 2s infinite;
            transition: opacity 0.4s ease;
        }
        .mosaic-tip.active { display: block; }

        .back-btn {
            margin-top: 20px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #a5c3f3;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="heart-bg">
        <div class="heart" style="top: 15%; left: 10%; animation-delay: 0s;">❤️</div>
        <div class="heart" style="top: 25%; left: 80%; animation-delay: 0.5s; font-size: 14px;">💖</div>
        <div class="heart" style="top: 60%; left: 15%; animation-delay: 1.2s; font-size: 16px;">❤️</div>
        <div class="heart" style="top: 45%; left: 85%; animation-delay: 0.8s;">💕</div>
        <div class="heart" style="top: 75%; left: 70%; animation-delay: 1.5s; font-size: 13px;">❤️</div>
        <div class="heart" style="top: 85%; left: 25%; animation-delay: 0.3s;">✨</div>
    </div>

    <div id="page-video">
        <div class="card-container">
            <div class="video-box">
                <video id="myVideo" loop playsinline webkit-playsinline preload="auto">
                    <source src="77memory.mp4" type="video/mp4">
                </video>
            </div>
            <div class="footer-text">
                <div class="main-title"> Happy Birthday!🎂 </div>
                <div class="subtitle">11 to 77 🤍</div>
            </div>
        </div>
        
        <div class="audio-tip">✨ 轻点屏幕播放视频</div>
        
        <button class="next-btn" id="to-text-btn">🪐 打开生日礼物</button>
    </div>

    <div id="page-text">
        <div class="text-card">
            <div class="tabs-nav">
                <button class="tab-btn active" onclick="switchTab(1)">1</button>
                <button class="tab-btn" onclick="switchTab(2)">2</button>
                <button class="tab-btn" onclick="switchTab(3)">3</button>
                <button class="tab-btn" onclick="switchTab(4)">4</button>
                <button class="tab-btn" onclick="switchTab(5)">5</button>
            </div>

            <div class="mosaic-container" onclick="unlockCurrentTab()">
                <div class="tab-content-wrapper" id="text-wrapper">
                    <div class="tab-panel active" id="content-1">这是第一阶段的回忆文字。✨<br>相识的第一天，天气很好...</div>
                    <div class="tab-panel" id="content-2">这是第二阶段的回忆文字。🌙<br>我们一起去了想去的地方。</div>
                    <div class="tab-panel" id="content-3">这是第三阶段的回忆文字。🧸<br>谢谢你一直以来的包容。</div>
                    <div class="tab-panel" id="content-4">这是第四阶段的回忆文字。🪐<br>那些深夜里聊过的秘密。</div>
                    <div class="tab-panel" id="content-5">这是第五阶段的回忆文字。❤️<br>未来的日子，我们还要一起走。</div>
                </div>

                <div class="mosaic-text-overlay" id="tip-overlay">
                    <div class="mosaic-tip active" id="tip-1">🔒 拆开相识的第 1 个秘密</div>
                    <div class="mosaic-tip" id="tip-2">🔒 悄悄刮开第 2 个故事</div>
                    <div class="mosaic-tip" id="tip-3">🔒 触发第 3 颗星星的记忆</div>
                    <div class="mosaic-tip" id="tip-4">🔒 打开第 4 份独家惊喜</div>
                    <div class="mosaic-tip" id="tip-5">🔒 终点站：第 5 份终极浪漫</div>
                </div>
            </div>
        </div>

        <button class="back-btn" id="to-video-btn">返回视频</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="backmusic.mp3" type="audio/mpeg">
    </audio>

    <script>
        var video = document.getElementById('myVideo');
        var music = document.getElementById('bgMusic');
        var nextBtn = document.getElementById('to-text-btn');
        var textWrapper = document.getElementById('text-wrapper');
        var tipOverlay = document.getElementById('tip-overlay');
        var hasInteracted = false;
        
        // 核心骨架：分别记录 1-5 分区各自独立的解锁情况，互不干扰
        var unlockedTabs = { 1: false, 2: false, 3: false, 4: false, 5: false };
        var currentTab = 1; 

        // 1. 初始化视频静止
        video.addEventListener('loadedmetadata', function() { video.currentTime = video.duration - 0.1; });
        if (video.readyState >= 1) { video.currentTime = video.duration - 0.1; }

        // 2. 点击屏幕启动音视频
        document.addEventListener('click', function(e) {
            if(e.target.id === 'to-text-btn' || e.target.id === 'to-video-btn' || e.target.classList.contains('tab-btn') || e.target.closest('.mosaic-container')) return;
            if (!hasInteracted) {
                video.currentTime = 0; video.play().catch(function(e){});
                music.currentTime = 0; music.play().catch(function(e){});
                var tip = document.querySelector('.audio-tip'); if(tip) tip.style.display = 'none';
                setTimeout(function() { nextBtn.classList.add('show'); }, 1000); 
                hasInteracted = true;
            }
        });

        // 3. 页面切换
        var pageVideo = document.getElementById('page-video');
        var pageText = document.getElementById('page-text');

        document.getElementById('to-text-btn').addEventListener('click', function(e) {
            e.stopPropagation(); 
            pageVideo.style.opacity = '0'; pageVideo.style.transform = 'translateY(-20px)';
            setTimeout(function() {
                pageVideo.style.display = 'none'; pageText.style.display = 'flex';
                setTimeout(function() { 
                    pageText.classList.add('active'); 
                    updateTabVisualState(); 
                }, 20);
            }, 600);
        });

        document.getElementById('to-video-btn').addEventListener('click', function(e) {
            e.stopPropagation(); pageText.classList.remove('active');
            setTimeout(function() {
                pageText.style.display = 'none'; pageVideo.style.display = 'flex';
                setTimeout(function() { pageVideo.style.opacity = '1'; pageVideo.style.transform = 'translateY(0)'; }, 20);
            }, 600);
        });

        // 4. 1-5 分类导航点击切换
        function switchTab(tabIndex) {
            currentTab = tabIndex; 

            // 按钮高亮切
            var buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(function(btn, index) {
                if(index === (tabIndex - 1)) btn.classList.add('active'); else btn.classList.remove('active');
            });

            // 内容显示切
            var panels = document.querySelectorAll('.tab-panel');
            panels.forEach(function(panel) {
                if(panel.id === 'content-' + tabIndex) panel.classList.add('active'); else panel.classList.remove('active');
            });

            // 提示词切
            var tips = document.querySelectorAll('.mosaic-tip');
            tips.forEach(function(tip) {
                if(tip.id === 'tip-' + tabIndex) tip.classList.add('active'); else tip.classList.remove('active');
            });

            // 更新当前新分区的独立状态
            updateTabVisualState();
        }

        // 5. 状态同步：只对当前的分区做模糊/清晰的控制
        function updateTabVisualState() {
            if (unlockedTabs[currentTab]) {
                // 如果这个分区点开过：立刻彻底清晰，不留任何痕迹
                textWrapper.classList.add('unlocked');
                tipOverlay.style.opacity = '0';
            } else {
                // 如果这个分区还没被解开：保持绝对模糊，露出它自己的提示词
                textWrapper.classList.remove('unlocked');
                tipOverlay.style.opacity = '1';
            }
        }

        // 6. 点击文字容器区，仅对当前分区激活散开清晰效果
        function unlockCurrentTab() {
            if (unlockedTabs[currentTab]) return;

            // 渐隐当前提示词
            tipOverlay.style.opacity = '0'; 
            
            // 模糊滤镜解除（中心向外清晰）
            textWrapper.classList.add('unlocked');
            
            // 永久记录该单独分区解锁成功
            unlockedTabs[currentTab] = true; 
        }
    </script>

</body>
</html>
