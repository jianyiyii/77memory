<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Our Memory ✨</title>
    <style>
        /* 基础重置 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* 禁止手机端长按选择文字和弹出菜单，保证刮刮乐顺畅 */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #121b2d 0%, #1a1c3a 50%, #2a1b35 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; 
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* --- 闪动爱心背景 --- */
        .heart-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            z-index: 1;
        }
        .heart {
            position: absolute;
            color: rgba(255, 192, 203, 0.25);
            font-size: 20px;
            animation: blink 3s infinite ease-in-out;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 0.9; transform: scale(1.2); text-shadow: 0 0 10px rgba(255,192,203,0.5); }
        }

        /* --- 第一页：视频卡片页 --- */
        #page-video {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            z-index: 2;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .card-container {
            width: 100%;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.07);
            padding: 16px 16px 20px 16px;
            border-radius: 28px;
            border: 2px solid rgba(255, 192, 203, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 0 0 15px rgba(165, 195, 243, 0.2);
            backdrop-filter: blur(12px);
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .video-box {
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: #000;
        }
        video { width: 100%; display: block; object-fit: cover; }
        .footer-text { margin-top: 16px; text-align: center; }
        .main-title {
            color: #ffccd5; font-size: 16px; font-weight: bold; letter-spacing: 3px; margin-bottom: 6px;
            text-shadow: 0 0 8px rgba(255, 204, 213, 0.6);
        }
        .subtitle { color: #a5c3f3; font-size: 12px; letter-spacing: 1px; opacity: 0.8; }

        .audio-tip {
            margin-top: 15px; background: rgba(255, 255, 255, 0.1); color: #fff; font-size: 11px;
            padding: 4px 12px; border-radius: 20px; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }

        .next-btn {
            margin-top: 25px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #ffccd5 0%, #a5c3f3 100%);
            border: none;
            border-radius: 20px;
            color: #121b2d;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 8px 20px rgba(165, 195, 243, 0.4);
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease, transform 0.3s ease; 
        }
        .next-btn.show { opacity: 1; pointer-events: auto; }
        .next-btn:active { transform: scale(0.95); }

        /* --- 第二页：分类文本页 --- */
        #page-text {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            z-index: 2;
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none; 
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        #page-text.active { opacity: 1; transform: translateY(0); pointer-events: auto; }

        .text-card {
            width: 100%;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 28px;
            padding: 25px;
            border: 2px solid rgba(165, 195, 243, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tabs-nav {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px;
            border-radius: 50px;
        }

        .tab-btn {
            flex: 1;
            padding: 8px 0;
            background: transparent;
            border: none;
            color: #a5c3f3;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
            text-align: center;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #ffccd5 0%, #a5c3f3 100%);
            color: #121b2d;
            box-shadow: 0 4px 10px rgba(255, 204, 213, 0.3);
        }

        /* 核心：刮刮乐容器区 */
        .scratch-container {
            width: 100%;
            height: 200px; /* 固定高度确保排版统一 */
            position: relative;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 底层的真实文字 */
        .tab-content-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
        }

        .tab-panel {
            display: none; 
            color: #e2e8f0;
            font-size: 14px;
            line-height: 1.8;
            letter-spacing: 1.5px;
            white-space: pre-wrap; 
            width: 100%;
        }
        .tab-panel.active { display: block; }

        /* 顶层的刮刮乐画布涂层 */
        #scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: pointer;
            touch-action: none; /* 防止手机上刮卡时导致页面乱滚 */
        }

        .back-btn {
            margin-top: 20px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #a5c3f3;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="heart-bg">
        <div class="heart" style="top: 15%; left: 10%; animation-delay: 0s;">❤️</div>
        <div class="heart" style="top: 25%; left: 80%; animation-delay: 0.5s; font-size: 14px;">💖</div>
        <div class="heart" style="top: 60%; left: 15%; animation-delay: 1.2s; font-size: 16px;">❤️</div>
        <div class="heart" style="top: 45%; left: 85%; animation-delay: 0.8s;">💕</div>
        <div class="heart" style="top: 75%; left: 70%; animation-delay: 1.5s; font-size: 13px;">❤️</div>
        <div class="heart" style="top: 85%; left: 25%; animation-delay: 0.3s;">✨</div>
    </div>

    <div id="page-video">
        <div class="card-container">
            <div class="video-box">
                <video id="myVideo" loop playsinline webkit-playsinline preload="auto">
                    <source src="77memory.mp4" type="video/mp4">
                </video>
            </div>
            <div class="footer-text">
                <div class="main-title"> Our Memory 🤍 </div>
                <div class="subtitle">Tired of my emotions.</div>
            </div>
        </div>
        
        <div class="audio-tip">✨ 轻点屏幕，开启魔法回忆</div>
        
        <button class="next-btn" id="to-text-btn">🪐 打开回忆图鉴</button>
    </div>

    <div id="page-text">
        <div class="text-card">
            <div class="tabs-nav">
                <button class="tab-btn active" onclick="switchTab(1)">1</button>
                <button class="tab-btn" onclick="switchTab(2)">2</button>
                <button class="tab-btn" onclick="switchTab(3)">3</button>
                <button class="tab-btn" onclick="switchTab(4)">4</button>
                <button class="tab-btn" onclick="switchTab(5)">5</button>
            </div>

            <div class="scratch-container">
                <div class="tab-content-wrapper">
                    <div class="tab-panel active" id="content-1">这是第一阶段的回忆文字。✨<br>相识的第一天，天气很好...</div>
                    <div class="tab-panel" id="content-2">这是第二阶段的回忆文字。🌙<br>我们一起去了想去的地方。</div>
                    <div class="tab-panel" id="content-3">这是第三阶段的回忆文字。🧸<br>谢谢你一直以来的包容。</div>
                    <div class="tab-panel" id="content-4">这是第四阶段的回忆文字。🪐<br>那些深夜里聊过的秘密。</div>
                    <div class="tab-panel" id="content-5">这是第五阶段的回忆文字。❤️<br>未来的日子，我们还要一起走。</div>
                </div>
                <canvas id="scratch-canvas"></canvas>
            </div>
        </div>

        <button class="back-btn" id="to-video-btn">返回视频</button>
    </div>

    <audio id="bgMusic" loop>
        <source src="backmusic.mp3" type="audio/mpeg">
    </audio>

    <script>
        var video = document.getElementById('myVideo');
        var music = document.getElementById('bgMusic');
        var nextBtn = document.getElementById('to-text-btn');
        var hasInteracted = false;

        // 1. 初始化视频静止
        video.addEventListener('loadedmetadata', function() { video.currentTime = video.duration - 0.1; });
        if (video.readyState >= 1) { video.currentTime = video.duration - 0.1; }

        // 2. 点击屏幕启动播放与按钮渐显
        document.addEventListener('click', function(e) {
            if(e.target.id === 'to-text-btn' || e.target.id === 'to-video-btn' || e.target.classList.contains('tab-btn') || e.target.id === 'scratch-canvas') return;
            if (!hasInteracted) {
                video.currentTime = 0; video.play().catch(function(e){});
                music.currentTime = 0; music.play().catch(function(e){});
                var tip = document.querySelector('.audio-tip'); if(tip) tip.style.display = 'none';
                setTimeout(function() { nextBtn.classList.add('show'); }, 1000); 
                hasInteracted = true;
            }
        });

        // 3. 页面切换逻辑
        var pageVideo = document.getElementById('page-video');
        var pageText = document.getElementById('page-text');

        document.getElementById('to-text-btn').addEventListener('click', function(e) {
            e.stopPropagation(); 
            pageVideo.style.opacity = '0'; pageVideo.style.transform = 'translateY(-20px)';
            setTimeout(function() {
                pageVideo.style.display = 'none'; pageText.style.display = 'flex';
                setTimeout(function() { 
                    pageText.classList.add('active'); 
                    initScratch(); // 进入文字页时初始化刮刮乐
                }, 20);
            }, 600);
        });

        document.getElementById('to-video-btn').addEventListener('click', function(e) {
            e.stopPropagation(); pageText.classList.remove('active');
            setTimeout(function() {
                pageText.style.display = 'none'; pageVideo.style.display = 'flex';
                setTimeout(function() { pageVideo.style.opacity = '1'; pageVideo.style.transform = 'translateY(0)'; }, 20);
            }, 600);
        });

        // 4. 1-5 分类标签切换
        function switchTab(tabIndex) {
            var buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(function(btn, index) {
                if(index === (tabIndex - 1)) btn.classList.add('active'); else btn.classList.remove('active');
            });

            var panels = document.querySelectorAll('.tab-panel');
            panels.forEach(function(panel) {
                if(panel.id === 'content-' + tabIndex) panel.classList.add('active'); else panel.classList.remove('active');
            });

            initScratch(); // 每次切分类时重置刮刮乐涂层
        }

        // 5. ─── 刮刮乐核心功能实现 ───
        var canvas = document.getElementById('scratch-canvas');
        var ctx = canvas.getContext('2d');
        var isDrawing = false;

        function initScratch() {
            // 动态设置画布物理大小与容器一致
            var container = canvas.parentNode;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;

            // 绘制灰色可爱涂层
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = '#4a5568'; // 莫兰迪深灰涂层
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 在涂层上绘制提示文字
            ctx.font = 'bold 14px sans-serif';
            ctx.fillStyle = '#cbd5e1'; // 亮白字颜色
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // ✏️ 这里是涂层上的提示文字，你可以改成任意你想要的句子
            ctx.fillText('✨ 动动手指刮开悄悄话 ✨', canvas.width / 2, canvas.height / 2);

            // 设置擦除画笔的属性（圆形，半径24像素）
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = 48; 
            
            // 核心黑科技：将混合模式设为'destination-out'，画笔划过的地方会变透明
            ctx.globalCompositeOperation = 'destination-out'; 
        }

        // 绑定刮卡的手机触摸与鼠标事件
        function getEventPos(e) {
            var rect = canvas.getBoundingClientRect();
            var clientX = e.touches ? e.touches[0].clientX : e.clientX;
            var clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function scratchStart(e) { isDrawing = true; scratchMove(e); }
        function scratchMove(e) {
            if (!isDrawing) return;
            e.preventDefault();
            var pos = getEventPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }
        function scratchEnd() { isDrawing = false; ctx.beginPath(); }

        // 监听鼠标事件 (PC端测试用)
        canvas.addEventListener('mousedown', scratchStart);
        canvas.addEventListener('mousemove', scratchMove);
        window.addEventListener('mouseup', scratchEnd);

        // 监听触摸事件 (手机端核心)
        canvas.addEventListener('touchstart', scratchStart);
        canvas.addEventListener('touchmove', scratchMove);
        window.addEventListener('touchend', scratchEnd);
    </script>

</body>
</html>
